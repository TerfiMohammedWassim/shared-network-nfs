- name: Configuration de Switch1 (L2 - VLAN 10/20)
  hosts: Switch1
  gather_facts: no

  tasks:

    #- name: Supprimer la configuration existante
     # nclu:
      #  commands:
       #   - del all
       # commit: yes


    - name: Configurer bond0 LACP vers le serveur NFS (VLAN 10 access)
      command: " {{ item }}"
      loop:
        - net add bond bond0 bond slaves swp1,swp2
        - net add bond bond0 bond mode 802.3ad
        - net add bond bond0 bond miimon 100
        - net add bond bond0 bridge access 10
        - net commit

    - name: Configurer le bridge VLAN-aware
      command: " {{ item }}"
      loop:
        - net add bridge bridge vlan-aware
        - net add bridge bridge ports bond0,swp3,swp4
        - net add bridge bridge vids 10,20
        - net commit


    - name: Configurer swp4 accès VLAN 10 (Machine1)
      command: " {{ item }}"
      loop:
        - net add interface swp4 bridge access 10
        - net commit

    - name: Configurer swp3 trunk vers Switch3 (VLAN 10 + 20)
      nclu:
        commands:
          - add interface swp3 bridge trunk vlans 10,20
        commit: yes

    - name: Vérifier les interfaces
      command: net show interface
      register: interface_status

    - name: Afficher les interfaces
      debug:
        msg: "{{ interface_status.stdout_lines }}"

    - name: Vérifier les VLANs
      command: net show bridge vlan
      register: vlan_status

    - name: Afficher les VLANs
      debug:
        msg: "{{ vlan_status.stdout_lines }}"
