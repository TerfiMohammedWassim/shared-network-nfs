
- name: Configuration de Machine Debian 1
  hosts: machine1
  become: yes
  gather_facts: no

  tasks:

    - name: Installer les paquets réseau
      apt:
        name:
          - net-tools
          - iproute2
        state: present
        update_cache: yes

    - name: Configurer ens33 avec IP fixe
      copy:
        dest: /etc/network/interfaces
        content: |
          # Loopback
          auto lo
          iface lo inet loopback

          # Interface ens33
          auto ens33
          iface ens33 inet static
              address 192.168.10.3
              netmask 255.255.255.0
      notify: restart networking

    - name: Vérifier l'interface ens33
      command: ip addr show ens33
      register: ip_status

    - name: Afficher le résultat
      debug:
        msg: "{{ ip_status.stdout_lines }}"

  handlers:
    - name: restart networking
      systemd:
        name: networking
        state: restarted